<div class="view" id="view-audit-logs">
  <div class="card">
    <div class="card-hd">
      <h3 class="card-title">System Audit Logs</h3>
    </div>
    <div class="card-bd">
      <table class="table" style="width: 100%; border-collapse: collapse;">
        <thead>
          <tr style="border-bottom: 2px solid var(--border); text-align: left;">
            <th style="padding: 12px; color: var(--text-soft);">Date & Time</th>
            <th style="padding: 12px; color: var(--text-soft);">Project Name</th>
            <th style="padding: 12px; color: var(--text-soft);">User</th>
            <th style="padding: 12px; color: var(--text-soft);">Action</th>
            <th style="padding: 12px; color: var(--text-soft);">Remarks</th>
          </tr>
        </thead>
        <tbody id="audit-logs-tbody">
        </tbody>
      </table>
    </div>
  </div>
</div>
