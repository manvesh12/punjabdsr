<div id="view-users" class="view">
  <div class="header-row">
    <div>
      <div class="page-title">User Management</div>
      <div class="page-sub">Manage portal users, roles, upload/review rights, and assigned access scopes</div>
    </div>
    <button class="btn btn-saffron btn-sm" onclick="openAddUserPrompt()">+ Add User</button>
  </div>
  <div class="card">
    <div class="card-bd">
      <div class="tbl-wrap">
        <table class="tbl">
          <thead>
            <tr>
              <th>Email</th>
              <th>Role</th>
              <th>Upload</th>
              <th>Review</th>
              <th>Access</th>
              <th>Scope</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="users-table-body">
            <tr><td colspan="8" style="text-align:center;">Loading users...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
