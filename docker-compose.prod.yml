version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dsr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dsr}
      POSTGRES_DB: ${POSTGRES_DB:-dsr}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    depends_on:
      - postgres
      - redis
      - minio
    env_file:
      - .env.production
    ports:
      - "8080:8080"
    command: npm run start --workspace @dsr/api

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: always
    depends_on:
      - postgres
      - redis
      - minio
    env_file:
      - .env.production
    command: npm run start:worker --workspace @dsr/api

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: always
    depends_on:
      - api
    env_file:
      - .env.production
    ports:
      - "3000:3000"
    command: npm run start --workspace @dsr/web

volumes:
  postgres_data:
  minio_data:
